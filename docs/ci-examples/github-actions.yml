name: LeakGuard Scan

on:
  pull_request:

jobs:
  leakguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g leakguard
      - run: leakguard scan . --format sarif --output leakguard.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: leakguard.sarif
